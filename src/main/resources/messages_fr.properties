speaker.event=Votre session
speaker.event.description1=Nous (les organisateurs) seront sur le lieu de l'ÃĐvÃĐnement Ã  la Manufacture des tabacs Lyon, le mercredi 18 aprÃĻs midi jusquÃ  18:00 (le jour avant la confÃĐrence). Si vous voulez jeter un oeil aux salles ou tester le matÃĐriel, n'hÃĐsitez pas Ã  vous joindre Ã  nous.
speaker.event.description2=L'ÃĐquipe d'organisation sera aider de plusieurs volontaires et ils risquent de ne pas vous reconnaÃŪtre quand vous arriverez Ã  la confÃĐrence. A l'entrÃĐe vous devez leur <b>donner votre nom</b>, et leur dire que vous ÃŠtes un speaker pour qu'il vous donne votre badge. <b>Vous n'avez pas besoin de ticket imprimÃĐ pour rentrer</b>.
speaker.event.description3=La confÃĐrence commencera Ã  8:45 avec quelques mots de l'ÃĐquipe. Ensuite <b>chaque speaker aura 30 secondes (timeboxed) pour introduire son talk/workshop</b> (Nom des seakers, titre de la session, salle, programmation, idÃĐes essentielles...) en anglais ou en franÃ§ais (Il n'y a pas d'introduction pour les sessions randoms car nous voulons garder la surprise jusqu'au dernier moment). La premiÃĻre keynote commencera vers 8:55.

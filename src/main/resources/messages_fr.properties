mixteen.title=MixTeen
mixteen.intro=Les enfants, on fait quoi pendant les vacances ? On programme !</br>Pas besoin dâÃŠtre un geek en herbe, pas besoin de passer son temps devant un ordinateur...</br>Avec de la crÃĐativitÃĐ et de la curiositÃĐ, il est possible de rÃĐaliser des programmes informatiques tout en sâamusant.</br>Pour les parents : Proposez Ã  vos enfants de comprendre lâinformatique de faÃ§on ludique, avec des outils qui leur sont adaptÃĐs. Nous leur ferons dÃĐcouvrir les clÃĐs de la programmation.</br>Pour les enfants : apprenez Ã  crÃĐer vos mini-jeux, mini-films sur un ordinateur en venant programmer avec nous !
mixteen.how.title=Comment ca se passe ?
mixteen.how.text=<ul><li>Les inscriptions se font exclusivement via <a href="https://yurplan.com/event/Mi-X-Tee-N-2017/15972">la billeterie YurPlan</a></li><li>Plusieurs activitÃĐs seront proposÃĐes:<ul><li>Pour tous : <a href="http://scratch.mit.edu/">Scratch</a></li><li>Ateliers de dÃĐcouverte des principes de l'informatique : jeux pour dÃĐcouvrir le binaire, le codage d'images...</li><li><a href="https://www.thymio.org/fr:thymio">Thymio</a> : un petit robot facile Ã  programmer qui permet de comprendre les bases de la robotique, et se dÃĐplace suivant les diffÃĐrentes instructions des enfants.</li><li><a href="http://microbit.org/">Micro:bit</a> : une carte ÃĐlaborÃĐ sous la supervision de la BBC Ã  destination des ÃĐcoliers anglais. Elle permet lâinitiation Ã  lâÃĐlectronique, lâIoT et la programmation.</li><li><a href="http://www.lexaloffle.com/pico-8.php">Pico-8</a> : Ã  l'aide d'une console qui n'a jamais existÃĐ mais qui se programme, inventez et programmez vos propres jeux.</li><li>Les plus courageux installeront Ã  l'avance les outils nÃĐcessaires: pour Scratch installer l'application <a href="https://scratch.mit.edu/scratch2download/">en version 2.0</a></li></ul></li><li>Puis rendez-vous le vendredi 21 avril Ã  14h30 Ã  la Manufacture des tabacs (<a href="/about">mÃŠme endroit que MiXiT</a>)</li> <li>L'enfant peut venir avec son ordinateur portable</li><li>Une premiÃĻre sÃĐrie d'ateliers en binÃīmes dÃĐmarre</li><li>Un petit gouter</li><li>DeuxiÃĻme sÃĐrie d'ateliers, on fait tourner sur les activitÃĐs</li><li>Vers 17h, les enfants prÃĐsentent leurs rÃĐalisations aux autres enfants et aux parents ÃĐbahis de tant de prouesses technologiques ;)</li><li>A 18h00, nous montrerons Ã  l'assemblÃĐe rÃĐunie de MiXiT le rÃĐsultat de notre aprÃĻs midi.</li></ul>Une question ? <a href="mailto:mixteen.lyon@gmail.com" target="_top">Contactez-nous</a>!
mixteen.story.title=L'histoire de MixTeen
mixteen.story.text=<ul><li>Lors de la keynote finale de de Mix-IT 2012, Pamela Fox imaginait un monde oÃđ l'on apprend Ã  coder dÃĻs notre plus jeune ÃĒge et fixe Ã  chacun de nous un objectif : enseigner la programmation Ã  une personne.</li><li>Lors de l'ÃĐdition Mix-IT 2013, Audrey Neveu et Aline Paponaud nous ont prÃĐsentÃĐ l'initiative Programatoo qu'elles mÃĻnent avec d'autres passionÃĐs.</li><li>En octobre 2013, ce fut le cas lors d'un premier atelier le 5 octobre 2013, avec la participation essentielle d'Audrey Neveu. Les enfants purent dÃĐcouvrir Scratch et les premiÃĻres joies du code ainsi que Lego Mindstorms et l'apprentissage des bases de la robotique.</li><li>En 2014, on lance notre propre atelier de programmation dans le cadre de MiXiT, c'est la naissance de MixTeeN !</li></ul>

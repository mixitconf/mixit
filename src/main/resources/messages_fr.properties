accessibility.title=AccessibilitÃĐ
accessibility.part1.title=Une confÃĐrence accessible
accessibility.part1.lead=Le lieu qui accueille l?événement est accessible aux personnes ā mobilité réduite et les salles de conférences disposent de sičges réservés au public prioritaire.
accessibility.part1.p1=Le grand amphi est équipé d?un systčme de transcription en vélotypie (systčme RISP), et le petit amphi d&#39;un systčme de retranscription en automatique.
accessibility.part1.p2=Pour bÃĐnÃĐficier d'une place, envoyez nous un email Ã  <b>contact@mixitconf.org</b>, nous vous rÃĐpondrons rapidement et vous fournirons toutes les informations que vous souhaiterez. 
accessibility.part1.p3=Une salle est mise ā disposition pour allaiter ou tirer son lait.
accessibility.part2.title=Historique
accessibility.part2.lead=Historiquement, MiXiT s'est crÃĐÃĐe autour de cette notion d'accessibilitÃĐ, tout d'abord par une accessibilitÃĐ financiÃĻre avec un tarif pour deux jours bien moins cher que ce qui est proposÃĐ dans les autres confÃĐrence de cette envergure.
accessibility.part2.p1=La confÃĐrence MiXiT a aussi toujours ÃĐtÃĐ hÃĐbergÃĐe dans des lieux accessibles aux personnes Ã  mobilitÃĐ rÃĐduite.
accessibility.part2.p2=En 2017, nous avons rÃĐservÃĐ des salles spÃĐcifiques pour l'allaitement, car nous avions remarquÃĐ que de nombreuses personnes avec des enfants en bas ÃĒge souhaitaient assister Ã  des confÃĐrences mais ne bÃĐnÃĐficiait pas d'espaces intimes dans ce type d'ÃĐvÃĐnement. Cette mÃŠme annÃĐe, nous avons initiÃĐ une dÃĐmarche d'accessibilitÃĐ de MiXiT pour les personnes dÃĐficientes auditives.
accessibility.part2.p3=AprÃĻs avoir menÃĐ une enquÃŠte auprÃĻs de contacts sourds et malentendants, nous avons optÃĐ pour la transcription de nos confÃĐrences. Notre partenaire historique est <a href="http://www.scribovox.ovh/>Scribovox</a> qui propose une solution semi-automatique corrigÃĐe grÃĒce Ã  nos ÃĐquipes de bÃĐnÃĐvoles. En 2017, ce premier pas nous avait permis de tester notre capacitÃĐ Ã  proposer ce service sur une salle et avait aussi permis Ã  <a href="http://www.scribovox.ovh/>Scribovox</a> de tester sa solution sur un ÃĐvÃĐnement comme le notre.
accessibility.part2.p4=En 2018, nous avons passÃĐ un cap en ouvrant des places de sponsoring accessibilitÃĐ qui nous ont permis de financer l'ÃĐquipement d'une salle avec la solution de vÃĐlotypie <a href="http://www.systemerisp.com/" target="blank">Systeme RISP</a>. Nous avions 2 salles de confÃĐrence sur 4 ÃĐquipÃĐes en solution d'accessibilitÃĐ sourds et malentendants.
accessibility.part2.p5=Pour l'ÃĐdition 2019, nous avons ÃĐquipÃĐ la totalitÃĐ de nos salles de confÃĐrences (4 salles), 2 avec <a href="http://www.systemerisp.com/" target="blank">Systeme RISP</a> et 2 avec <a href="http://www.scribovox.ovh/>Scribovox</a>. La solution Scribovox nous permet de retranscrire les confÃĐrences en anglais.
accessibility.part3.title=Futur
accessibility.part3.lead=Pour les ÃĐditions Ã  venir, nous espÃĐrons pouvoir proposer des services de LSF, de LPC ainsi que des solutions pour les personnes aveugle ou mal voyantes.
accessibility.part3.p1=MalgrÃĐ la mise Ã  disponibilitÃĐ de ces services, il nous est difficile de faire venir un public visÃĐ c'est pourquoi nous avons ouvert 15 places financiÃĻrement gratuites moyennant un retour critique pour nous amÃĐliorer.
accessibility.part3.p2=Ces places peuvent etre prises en dehors du processus de billetterie en nous contactant directement par email.
accessibility.part3.p3=Pour bÃĐnÃĐficier d'une place, envoyez nous un email Ã  contact@mixitconf.org, nous vous rÃĐpondrons rapidement et vous fournirons toutes les informations que vous souhaiterez.

code-of-conduct.title=Code de conduite pour la confÃĐrence
code-of-conduct.p1=L'ÃĐquipe dâorganisation de la confÃĐrence MiXiT a Ã  cÅur de construire un ÃĐvÃĐnement inclusif dans lequel toutes et tous sont les bienvenuÂ·es. Câest pourquoi nous demandons Ã  toutes les personnes participant Ã  la confÃĐrence, y compris sponsors et bÃĐnÃĐvoles, de s'engager Ã  accepter le code d'ÃĐthique et de dÃĐontologie, ou ÂŦ code de conduite Âŧ suivant avant de participer. 
code-of-conduct.p2=L'organisation sâengage Ã  faire respecter ce code de conduite durant l'ÃĐvÃĐnement et peut ÃŠtre sollicitÃĐe Ã  tout moment par unÂ·e participantÂ·e qui serait tÃĐmoin ou victime dâune des situations allant Ã  son encontre. Nous attendons la coopÃĐration de chacunâ§e pour assurer un environnement sain et bienveillant pour touâ§teâ§s.
code-of-conduct.quick.title=La version rapide
code-of-conduct.quick.description=Notre confÃĐrence se veut une expÃĐrience sans harcÃĻlement, quel que soit votre identitÃĐ sexuelle, votre identitÃĐ de genre, votre orientation sexuelle ou amoureuse, votre ÃĒge, votre handicap, votre apparence physique, votre poids, votre origine ethnique ou votre religion. Nous ne tolÃĐrons aucun harcÃĻlement des participantâ§eâ§s Ã  la confÃĐrence, sous quelque forme que ce soit. Les expressions et les images Ã  connotation sexuelle ne sont pas appropriÃĐes lors de l'ÃĐvÃĐnement. Ceci inclut les confÃĐrences, les ateliers, les soirÃĐes, Twitter et les autres mÃĐdias en ligne. L'organisation s'engage Ã  prendre des sanctions appropriÃĐes pour les personnes qui violent ces rÃĻgles, jusqu'Ã  l'exclusion sans remboursement et le recours lÃĐgal.
code-of-conduct.lessquick.title=La version moins rapide
code-of-conduct.lessquick.p1=Le harcÃĻlement inclut des commentaires Ã  l'oral ou Ã  l'ÃĐcrit sur l'identitÃĐ sexuelle, l'identitÃĐ de genre, l'orientation sexuelle ou romantique, l'ÃĒge, le handicap, l'apparence physique, le poids, l'origine ethnique, la religion, les images Ã  connotation sexuelle dans des lieux publics, les intimidations dÃĐlibÃĐrÃĐes, la traque, la poursuite, un harcÃĻlement photographique ou vidÃĐo, une suite d'interruptions des confÃĐrences et des autres ÃĐvÃĐnements, un contact physique inappropriÃĐ et des avances sexuelles non dÃĐsirÃĐes.
code-of-conduct.lessquick.p2=Les participantâ§eâ§s Ã  qui il sera demandÃĐ d'arrÃŠter tout comportement de harcÃĻlement doivent arrÃŠter immÃĐdiatement.
code-of-conduct.lessquick.p3=Les sponsors sont aussi sujet Ã  la politique anti-harcÃĻlement. En particulier, les sponsors ne doivent pas utiliser d'images ou de supports Ã  connotation sexuelle. Ils ne doivent pas non plus se livrer Ã  des activitÃĐs Ã  connotation sexuelle. L'ÃĐquipe du stand (y compris les bÃĐnÃĐvoles) ne doit pas utiliser de vÃŠtements, uniformes ou costumes Ã  connotation sexuelle. Ils ne doivent pas non plus crÃĐer un environnement sexualisÃĐ.
code-of-conduct.lessquick.p4=Face Ã  un comportement de harcÃĻlement, l'ÃĐquipe d'organisation de la confÃĐrence peut prendre toute action qui lui semble adÃĐquate. Cela va d'un simple avertissement Ã  l'exclusion sans remboursement de la confÃĐrence.
code-of-conduct.lessquick.p5=Si vous vous sentez harcelÃĐâ§e, si vous pensez que quelqu'un se fait harceler, et plus gÃĐnÃĐralement en cas de problÃĻme, merci de contacter immÃĐdiatement lâÃĐquipe dâorganisation de l'ÃĐvÃĐnement. L'organisation s'assure que ses membres sont facilement identifiables (badge, brassard, tour de cou, t-shirtâĶ) prÃĐsentÃĐs au dÃĐbut de la confÃĐrence.
code-of-conduct.lessquick.p6=Les membres de l'organisation seront raviâ§eâ§s d'aider les participants Ã  contacter la sÃĐcuritÃĐ de l'hÃītel ou du bÃĒtiment oÃđ se dÃĐroule l'ÃĐvÃĐnement, ou les forces de l'ordre ; Ã  fournir une escorte ainsi qu'Ã  aider de toute autre faÃ§on les personnes victimes de harcÃĻlement, pour garantir leur sÃĐcuritÃĐ pendant la durÃĐe de l'ÃĐvÃĐnement.
code-of-conduct.lessquick.p7=Nous apprÃĐcions votre participation Ã  l'ÃĐvÃĐnement et nous attendons de chacunâ§e le respect de ces rÃĻgles dans le bÃĒtiment des confÃĐrences et des ateliers, ainsi que pendant les ÃĐvÃĐnements sociaux relatifs Ã  la confÃĐrence.
code-of-conduct.credits=<b>CrÃĐdits :</b> <a href="https://confcodeofconduct.com/index-fr.html" target="blank">confcodeofconduct.com</a>

